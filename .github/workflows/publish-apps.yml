name: Publish Apps

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Electron (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Set app version
        working-directory: frontend
        run: npm run app:version -- "${{ github.ref_name }}" "${{ github.run_number }}"

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build Electron package
        if: matrix.os != 'ubuntu-latest'
        working-directory: frontend
        run: npm run electron:dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Linux x64 Electron packages
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: npm run electron:dist -- --linux AppImage deb rpm --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Linux arm64 Electron packages
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: npm run electron:dist -- --linux deb rpm --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Rename Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: node packages/scripts/rename-linux-artifacts.cjs

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mailflow-electron-${{ matrix.os }}
          if-no-files-found: error
          path: |
            frontend/packages/release/*.AppImage
            frontend/packages/release/*.deb
            frontend/packages/release/*.dmg
            frontend/packages/release/*.exe
            frontend/packages/release/*.rpm

  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Set app version
        working-directory: frontend
        run: npm run app:version -- "${{ github.ref_name }}" "${{ github.run_number }}"

      - name: Build Android package
        working-directory: frontend
        run: npm run android:dist

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailflow-android
          if-no-files-found: error
          path: frontend/packages/release/*.apk

  release:
    name: Attach to GitHub Release
    needs:
      - desktop
      - android
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.apk
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.rpm
