name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: find src -name '*.js' -exec node --check {} \;

      - name: Test
        working-directory: backend
        run: npm test

      - name: Notification payload test
        working-directory: backend
        run: node test-notification.mjs

      - name: Audit
        working-directory: backend
        run: npm audit --audit-level=critical

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=critical
